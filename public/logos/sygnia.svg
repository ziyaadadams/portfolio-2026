<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Sygnia Logo - Based on brand description: Africa silhouette + sigma symbol -->
  <defs>
    <linearGradient id="sygniaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#333333"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="60" rx="4" fill="none"/>
  
  <!-- Africa/Sigma Icon -->
  <g transform="translate(15, 10)">
    <!-- Outer circle -->
    <circle cx="20" cy="20" r="18" fill="none" stroke="#000000" stroke-width="2"/>
    <!-- Africa silhouette stylized as sigma -->
    <path d="M20 6 L20 34 M8 14 Q20 8 32 14 M8 26 Q20 32 32 26" 
          fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Double bar (equals) device -->
    <line x1="6" y1="20" x2="34" y2="20" stroke="#000000" stroke-width="2"/>
  </g>
  
  <!-- Sygnia wordmark -->
  <text x="115" y="28" text-anchor="middle" fill="#000000" 
        font-family="Arial, Helvetica, sans-serif" font-size="20" 
        font-weight="700" letter-spacing="2">SYGNIA</text>
  
  <!-- Tagline -->
  <text x="115" y="44" text-anchor="middle" fill="#666666" 
        font-family="Arial, Helvetica, sans-serif" font-size="9" 
        font-weight="400" letter-spacing="1">ASSET MANAGEMENT</text>
</svg>